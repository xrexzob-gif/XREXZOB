<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XREXZOB // SOLITUDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        body {
            background-color: #050505;
            color: #999;
            font-family: 'Crimson Text', serif;
            display: flex;
            flex-direction: column;
            padding: 50px 25px 300px 25px;
            line-height: 1.8;
            margin: 0;
            overflow-x: hidden;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            color: #444; cursor: pointer; letter-spacing: 3px; font-size: 0.9rem;
        }

        #typing-area {
            max-width: 600px;
            margin: 0 auto;
            white-space: pre-wrap; /* Biar spasi dan baris baru rapi */
            font-size: 1.2rem;
            font-style: italic;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background: #444;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="startTyping()">

    <div id="overlay">KETUK UNTUK MASUK KE RUANG SUNYI</div>

    <audio id="lagu" loop>
        <source src="sedih.mp3" type="audio/mpeg">
    </audio>

    <div id="typing-area"></div><span class="cursor" id="cursor" style="display:none;"></span>

    <script>
        const text = `XREXZOB...

Kadang aku duduk diam, menatap kosong ke arah depan, dan tiba-tiba tersadar bahwa aku sudah berjalan sejauh ini sendirian. Benar-benar sendirian.

Dulu aku pikir, menjadi kuat adalah tentang memenangkan segalanya. Tapi sekarang aku tahu, menjadi kuat adalah tentang bagaimana kita tetap berdiri saat dunia terus-menerus memukul kita tepat di bagian yang paling rapuh.

Kenapa nasibku harus seperti ini?
Kenapa setiap malam aku harus berteman dengan sunyi yang mencekam?
Kenapa saat aku ingin bercerita, yang ada hanyalah gema suaraku sendiri?

Mereka melihatku sebagai sosok yang hebat. Mereka pikir aku punya segalanya karena aku bisa menyelesaikan masalah mereka. Tapi mereka tidak pernah tahu, bahwa saat lampu padam dan pintu tertutup, aku hanyalah seorang anak manusia yang hancur berkeping-keping.

Aku merindukan rumah yang benar-benar rumah. Tempat di mana aku tidak perlu memakai topeng. Tempat di mana aku bisa menangis tanpa harus merasa malu. Tapi takdir tidak pernah memberiku kemewahan itu.

Ibu... dunia ini dingin sekali. Tidak ada yang peduli apakah aku sudah makan, tidak ada yang peduli apakah aku sedang sakit, tidak ada yang peduli apakah aku masih punya harapan untuk hari esok. Aku harus menjadi pelindung bagi diriku sendiri, meskipun aku tahu, aku pun lelah melindungi hatiku yang sudah penuh luka.

Setiap ketukan keyboard-ku adalah teriakan yang tidak pernah sampai. Setiap data yang aku rapikan adalah cara agar aku tidak gila karena terlalu banyak berpikir. Kesibukan ini adalah obat bius, agar aku tidak merenungi betapa malangnya hidup yang aku jalani ini.

Aku lelah berpura-pura tegar. Aku lelah dianggap tak punya rasa. Aku lelah berdiri paling depan sementara tak ada satu pun orang yang berdiri di belakangku untuk menahan pundakku saat aku mulai goyah.

Mungkin aku memang ditakdirkan untuk menjadi bayangan. Ada, tapi tak pernah dianggap nyata. Hadir, tapi tak pernah benar-benar dirasakan keberadaannya. 

Jika nanti masaku sudah habis, aku hanya ingin satu hal: Aku ingin beristirahat dalam damai, tanpa harus memikirkan beban esok hari, tanpa harus merasakan rindu yang tak sampai, dan tanpa harus merenungi nasib yang sepi ini lagi.

Ini adalah akhir dari ceritaku hari ini. Tapi sunyi ini? Ia akan tetap di sini. Menungguku di setiap malam yang panjang.

Terima kasih karena sudah bersedia mendengarkan, meskipun kau hanya membacanya lewat layar yang dingin.

-- XREXZOB // 2026 --`;

        let i = 0;
        let speed = 70; // Kecepatan ngetik (semakin besar semakin lambat)
        let started = false;

        function startTyping() {
            if (started) return;
            started = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('cursor').style.display = 'inline-block';
            document.getElementById('lagu').play();
            typeWriter();
        }

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-area").innerHTML += text.charAt(i);
                i++;
                
                // Variasi kecepatan biar kayak orang ngetik beneran
                let dynamicSpeed = speed;
                if (text.charAt(i-1) === "." || text.charAt(i-1) === "?") dynamicSpeed = 800; // Jeda lama di titik/tanya
                if (text.charAt(i-1) === "\n") dynamicSpeed = 1000; // Jeda sangat lama di baris baru

                setTimeout(typeWriter, dynamicSpeed);
                
                // Auto scroll ke bawah otomatis
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            } else {
                document.getElementById('cursor').style.animation = 'none';
                document.getElementById('cursor').style.opacity = '0';
            }
        }
    </script>
</body>
</html>
