<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Tulus Arifin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Quicksand:wght@300;500&family=Tangerine:wght@700&display=swap');

        body {
            background-color: #050505;
            color: #c0c0c0;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            padding: 40px 20px;
        }

        #text-container {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            line-height: 2.2;
            min-height: 500px;
            white-space: pre-wrap;
            font-style: italic;
        }

        .section-divider {
            margin: 50px 0;
            border: 0;
            border-top: 1px solid #333;
            opacity: 0;
            transition: opacity 2s;
        }

        .signature {
            margin-top: 50px;
            font-family: 'Tangerine', cursive;
            font-size: 3.5rem;
            color: #fff;
            opacity: 0;
            transition: opacity 4s ease-in;
        }

        .timestamp {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 3s ease-in;
        }

        #play-btn {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 4px;
            transition: 0.8s;
        }

        #play-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .hidden { display: none; }

        #cursor {
            display: inline-block;
            width: 1.5px;
            height: 1.2rem;
            background-color: #fff;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="play-btn" onclick="startApp()">BUKA SURAT DARI ARIFIN</button>
    </div>

    <div class="container hidden" id="main-content">
        <div id="text-container"><span id="typed-text"></span><span id="cursor"></span></div>
        <hr class="section-divider" id="divider">
        <div class="signature" id="signature">Muhammad Arifin</div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <audio id="sad-music" loop>
        <source src="sedih.mp3" type="audio/mpeg">
    </audio>

    <script>
        const messageForHer = "Sayang, mungkin saat pesan ini muncul di hadapanmu, aku sudah tidak lagi bisa mendengar suaramu atau menggenggam tanganmu...\n\nMenulis ini rasanya berat, tapi aku ingin kamu tahu betapa berartinya kehadiranmu bagiku. Seandainya takdir memaksaku untuk pergi lebih dulu—entah karena sakit yang selama ini aku tahan, atau karena alasan lain yang menjadi rahasia Tuhan—aku ingin kamu tetap tegar menghadapi dunia.\n\nTolong, jaga dirimu baik-baik ya? Makanlah dengan teratur, istirahatlah yang cukup, dan jangan biarkan kesedihan menyelimuti harimu terlalu lama. Aku tahu mungkin akan sulit, tapi aku ingin melihatmu terus berjalan. \n\nKalau suatu hari nanti kamu merasa sangat rindu, kalau beban hidup terasa terlalu berat, atau jika kamu sekadar ingin bercerita tentang harimu... janganlah kamu merasa sendirian. Datanglah kepada Allah, bersujudlah dalam sholatmu. Ceritakan semuanya di sana. Aku selalu berharap, melalui perantara doa dan sujudmu, aku bisa tetap merasakan kehadiranmu dan mendengar setiap keluh kesahmu dari tempatku yang baru.\n\nAku ingin kamu menjadi sosok yang luar biasa. Rajinlah sholat, jangan pernah tinggalkan kewajibanmu pada Sang Pencipta. Berdoalah selalu untuk kesuksesanmu di dunia dan akhirat. Demi Tuhan, melihat kamu tetap istiqomah, tetap berjuang, dan tetap tersenyum dalam ketaatan sudah cukup membuat aku menjadi lelaki paling bangga yang pernah memilikimu.\n\nMaafkan aku, sayang... Maaf jika kehadiranku selama ini hanya memberikan beban. Maaf karena aku belum bisa jadi yang terbaik, belum bisa membahagiakanmu sepenuhnya, dan maaf karena aku tidak bisa menemanimu sampai kita menua bersama. Jika waktu bisa aku hentikan, aku hanya ingin tetap di sini, menjaga dan mencintaimu.\n\nNamun jika perpisahan ini adalah garisnya, ingatlah bahwa kamu pernah dicintai oleh seseorang dengan sangat tulus. Terima kasih sudah menemaniku di masa-masa sulit maupun senang. Sukseslah untuk masa depanmu, kejar semua mimpi kita yang belum sempat aku wujudkan bersamamu. Aku menyayangimu selamanya.";

        const messageForFamily = "\n\n--- \n\nDan untuk keluargaku tercinta, terutama untuk Bapak...\n\nPak, maafkan Arifin ya. Maaf kalau selama ini Arifin hanya bisa merepotkan dan menjadi beban buat Bapak. Arifin tahu betapa keras perjuangan Bapak selama ini untuk keluarga, dan Arifin merasa sangat bersalah karena belum sempat membalas keringat Bapak dengan kebahagiaan atau kesuksesan yang Bapak impikan.\n\nTerima kasih sudah menjadi sosok yang kuat buat Arifin. Tolong maafkan segala kesalahan Arifin, segala kata-kata yang mungkin pernah menyakiti hati Bapak, dan segala sikap Arifin yang belum bisa membanggakan. Arifin sayang banget sama Bapak.\n\nUntuk saudara-saudaraku semuanya, maafkan aku jika selama hidupku aku belum bisa menjadi saudara yang baik. Maaf jika keadaanku sekarang justru menambah beban pikiran kalian. Aku sangat berterima kasih karena kalian sudah mau menerima dan menyayangiku apa adanya. Tolong jaga Bapak baik-baik ya, tetaplah rukun dan saling menguatkan. Arifin titip maaf untuk semua kesalahan yang pernah Arifin perbuat. Terima kasih atas segalanya.";

        const fullText = messageForHer + messageForFamily;
        const typedTextElement = document.getElementById('typed-text');
        const signature = document.getElementById('signature');
        const timestampElement = document.getElementById('timestamp');
        const divider = document.getElementById('divider');
        const music = document.getElementById('sad-music');

        let index = 0;

        function typeWriter() {
            if (index < fullText.length) {
                typedTextElement.textContent += fullText.charAt(index);
                index++;
                setTimeout(typeWriter, 65);
            } else {
                divider.style.opacity = "1";
                signature.style.opacity = "1";
                timestampElement.style.opacity = "1";
                document.getElementById('cursor').style.display = 'none';
            }
        }

        function updateTime() {
            const now = new Date();
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            const dayName = days[now.getDay()];
            const dayDate = now.getDate();
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            const hour = now.getHours().toString().padStart(2, '0');
            const minute = now.getMinutes().toString().padStart(2, '0');

            timestampElement.textContent = `Tertulis pada: ${dayName}, ${dayDate} ${monthName} ${year} | ${hour}:${minute} WIB`;
        }

        function startApp() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            music.play();
            updateTime();
            setTimeout(typeWriter, 2000);
        }
    </script>
</body>
</html>
